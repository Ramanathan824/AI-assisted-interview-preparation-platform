<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HirePilot AI helps candidates and hiring teams prepare with polished, recruiter-ready interview experiences.">
    <title>{% block title %}HirePilot AI{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="page-shell">
        <nav class="navbar">
            <a class="brand" href="{% url 'home' %}">
                <span class="brand-mark">✦</span>
                <span>HirePilot AI</span>
            </a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard:dashboard' %}">Dashboard</a>
                    <a href="{% url 'accounts:logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}">Login</a>
                    <a href="{% url 'accounts:register' %}">Register</a>
                {% endif %}
            </div>
        </nav>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <p>Crafted for confident interviews, smarter hiring, and stronger first impressions.</p>
        </footer>
    </div>

    <script src="{% static 'app.js' %}"></script>
</body>
</html>
